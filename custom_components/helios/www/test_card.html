<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helios Card — Test</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #f0f0f0;
      font-family: Roboto, sans-serif;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: flex-start;
    }
    .col {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 360px;
    }
    h3 {
      margin: 0 0 4px;
      font-size: 12px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .dark-col {
      color-scheme: dark;
      background: #1c1c1e;
      padding: 12px;
      border-radius: 12px;
    }
    .dark-col h3 { color: #999; }
    .dark-col helios-card {
      --card-background-color: #2c2c2e;
      --ha-card-border-radius: 12px;
      --primary-text-color: #e5e5e7;
      --secondary-text-color: #aeaeb2;
      --secondary-background-color: #3a3a3c;
      --divider-color: #48484a;
    }
  </style>
</head>
<body>

<div class="col">
  <h3>Flux + appareils</h3>
  <helios-card id="card-full"></helios-card>
</div>

<div class="col">
  <h3>Sans batterie — nuit</h3>
  <helios-card id="card-night"></helios-card>
</div>

<div class="col">
  <h3>Compact — jour Tempo rouge</h3>
  <helios-card id="card-compact"></helios-card>
</div>

<div class="col dark-col">
  <h3>Mode sombre — jour Tempo bleu</h3>
  <helios-card id="card-dark"></helios-card>
</div>

<script src="./helios-card.js" type="module"></script>
<script type="module">
// ---------------------------------------------------------------------------
// Mock hass helper
// ---------------------------------------------------------------------------
const MOCK_ENTRY_ID = "helios_test_entry_abc123";

// Entity registry: maps entity_id → { config_entry_id, unique_id }
// Mirrors what HA exposes in hass.entities for auto-discovery.
function mockEntity(suffix) {
  return { config_entry_id: MOCK_ENTRY_ID, unique_id: `${MOCK_ENTRY_ID}_${suffix}` };
}

const MOCK_ENTITIES = {
  // Power sensors
  "sensor.helios_pv_power":      mockEntity("pv_power"),
  "sensor.helios_grid_power":    mockEntity("grid_power"),
  "sensor.helios_house_power":   mockEntity("house_power"),
  "sensor.helios_global_score":  mockEntity("global_score"),
  "sensor.helios_battery_action":mockEntity("battery_action"),
  "sensor.helios_battery_power": mockEntity("battery_power"),
  // Device manual switches — suggested_object_id: helios_{slug}_manual
  "switch.helios_pool_manual":           mockEntity("device_pool_manual"),
  "switch.helios_water_heater_manual":   mockEntity("device_water_heater_manual"),
  "switch.helios_dishwasher_manual":     mockEntity("device_dishwasher_manual"),
  "switch.helios_washing_machine_manual":mockEntity("device_washing_machine_manual"),
  "switch.helios_ev_manual":             mockEntity("device_ev_manual"),
  // Device power sensors — suggested_object_id: helios_{slug}_power
  "sensor.helios_pool_power":            mockEntity("device_pool_power"),
  "sensor.helios_water_heater_power":    mockEntity("device_water_heater_power"),
  "sensor.helios_dishwasher_power":      mockEntity("device_dishwasher_power"),
  "sensor.helios_washing_machine_power": mockEntity("device_washing_machine_power"),
  "sensor.helios_ev_power":              mockEntity("device_ev_power"),
  // Pool secondary sensors — suggested_object_id: helios_{slug}_filtration_{suffix}
  "sensor.helios_pool_filtration_done":        mockEntity("pool_pool_done"),
  "sensor.helios_pool_filtration_required":    mockEntity("pool_pool_required"),
  "sensor.helios_pool_force_remaining":        mockEntity("pool_pool_force_remaining"),
  // Appliance state sensors — suggested_object_id: helios_{slug}_state
  "sensor.helios_dishwasher_state":      mockEntity("appliance_dishwasher_state"),
  "sensor.helios_washing_machine_state": mockEntity("appliance_washing_machine_state"),
};

function makeHass(states) {
  return {
    states,
    entities: MOCK_ENTITIES,
    callService(domain, service, data) {
      console.log(`callService: ${domain}.${service}`, data);
    },
  };
}

function state(value, attributes = {}) {
  return { state: String(value), attributes };
}

// ---------------------------------------------------------------------------
// Scenario 1 — sunny day, pool running, WH heating, appliance waiting
// ---------------------------------------------------------------------------
const hassDay = makeHass({
  "sensor.helios_pv_power":                   state(2800),
  "sensor.helios_grid_power":                 state(-300),   // export
  "sensor.helios_house_power":                state(1200),
  "sensor.helios_global_score":               state(0.74, { tempo_color: "blue", mode: "auto", peak_pv_w: 3500, grid_subscription_w: 6000, battery_soc: 58 }),
  "sensor.helios_battery_action":             state("charge"),
  "switch.helios_auto_mode":                  state("on"),
  "sensor.my_battery_soc":                    state(58),

  // Devices (metadata attrs used by auto-discovery)
  "switch.helios_piscine_manual":             state("off", {
    helios_device_on: true, last_effective_score: 0.82, last_decision_reason: "dispatch",
    device_name: "Piscine", device_type: "pool", device_priority: 7,
  }),
  "sensor.helios_pool_piscine_done":       state(150),   // minutes
  "sensor.helios_pool_piscine_required":   state(240),
  "sensor.helios_pool_piscine_force_remaining":       state(0),

  "switch.helios_chauffe_eau_manual":         state("off", {
    helios_device_on: true, last_effective_score: 0.45, last_decision_reason: "dispatch",
    device_name: "Chauffe-eau", device_type: "water_heater", device_priority: 6,
    wh_temp_entity: "sensor.temperature_chauffe_eau", wh_temp_target: 61,
  }),
  "sensor.temperature_chauffe_eau":           state(54.2),

  "switch.helios_lave_vaisselle_manual":      state("off", {
    helios_device_on: false, last_effective_score: 0.31, last_decision_reason: "score_too_low",
    device_name: "Lave-vaisselle", device_type: "appliance", device_priority: 4,
  }),
  "sensor.helios_lave_vaisselle_state":        state("en_attente"),

  "switch.helios_lave_linge_manual":          state("off", {
    helios_device_on: true, last_effective_score: 0.29, last_decision_reason: "dispatch",
    device_name: "Lave-linge", device_type: "appliance", device_priority: 3,
  }),
  "sensor.helios_lave_linge_state":            state("en_route"),
  "sensor.helios_lave_linge_power":           state(2100),

  "switch.helios_voiture_manual":             state("off", {
    helios_device_on: true, last_effective_score: 0.68, last_decision_reason: "dispatch",
    device_name: "Voiture", device_type: "ev_charger", device_priority: 8,
    ev_soc_entity: "sensor.ev_soc", ev_plugged_entity: "binary_sensor.ev_branche",
  }),
  "sensor.ev_soc":                            state(72),
  "binary_sensor.ev_branche":                 state("on"),
  // Device power sensors (non-zero when ON)
  "sensor.helios_piscine_power":              state(750),
  "sensor.helios_chauffe_eau_power":          state(2000),
  "sensor.helios_lave_vaisselle_power":       state(0),     // en attente
  "sensor.helios_lave_linge_power":           state(2100),  // en route
  "sensor.helios_voiture_power":              state(1380),
});

// ---------------------------------------------------------------------------
// Scenario 2 — night, no PV, battery discharging
// ---------------------------------------------------------------------------
const hassNight = makeHass({
  "sensor.helios_pv_power":                   state(0),
  "sensor.helios_grid_power":                 state(450),    // import
  "sensor.helios_house_power":                state(900),
  "sensor.helios_global_score":               state(0.22, { tempo_color: "red", mode: "auto", peak_pv_w: 3500, grid_subscription_w: 6000 }),
  "sensor.helios_battery_action":             state("reserve"),
  "switch.helios_auto_mode":                  state("on"),
  // no battery_soc entity configured → hidden

  "switch.helios_piscine_manual":             state("off", {
    helios_device_on: false, last_effective_score: 0.0, last_decision_reason: "outside_window",
    device_name: "Piscine", device_type: "pool", device_priority: 7,
  }),
  "sensor.helios_pool_piscine_done":       state(240),   // done = required → satisfait
  "sensor.helios_pool_piscine_required":   state(240),

  "switch.helios_chauffe_eau_manual":         state("off", {
    helios_device_on: false, last_effective_score: 0.0, last_decision_reason: "satisfied",
    device_name: "Chauffe-eau", device_type: "water_heater", device_priority: 6,
    wh_temp_entity: "sensor.temperature_chauffe_eau", wh_temp_target: 61,
  }),
  "sensor.temperature_chauffe_eau":           state(62.1),

  "switch.helios_lave_vaisselle_manual":      state("off", {
    helios_device_on: true, last_effective_score: 0.55, last_decision_reason: "dispatch",
    device_name: "Lave-vaisselle", device_type: "appliance", device_priority: 4,
  }),
  "sensor.helios_lave_vaisselle_state":        state("en_route"),
  "sensor.helios_lave_vaisselle_power":       state(1950),

  "switch.helios_lave_linge_manual":          state("off", {
    helios_device_on: false, last_effective_score: 0.2, last_decision_reason: "no_budget",
    device_name: "Lave-linge", device_type: "appliance", device_priority: 3,
  }),
  "sensor.helios_lave_linge_state":            state("en_attente"),
});

// ---------------------------------------------------------------------------
// Inject config + hass into each card
// ---------------------------------------------------------------------------
const configFull = {
  entry_id: MOCK_ENTRY_ID,   // mode auto-découverte
  info_url: "https://example.com",
};

const configNight = {
  entry_id: MOCK_ENTRY_ID,
};

// ---------------------------------------------------------------------------
// Scenario 3 — compact, Tempo rouge, batterie faible, voiture branchée
// ---------------------------------------------------------------------------
const hassCompact = makeHass({
  "sensor.helios_pv_power":                   state(1500),
  "sensor.helios_grid_power":                 state(800),    // import
  "sensor.helios_house_power":                state(2200),
  "sensor.helios_global_score":               state(0.15, { tempo_color: "red", mode: "auto", peak_pv_w: 3500, grid_subscription_w: 6000, battery_soc: 18 }),
  "sensor.helios_battery_action":             state("reserve"),
  "switch.helios_auto_mode":                  state("on"),
  "sensor.my_battery_soc":                    state(18),

  "switch.helios_piscine_manual":             state("off", {
    helios_device_on: false, last_effective_score: 0.0, last_decision_reason: "outside_window",
    device_name: "Piscine", device_type: "pool", device_priority: 7,
  }),
  "sensor.helios_pool_piscine_done":       state(60),
  "sensor.helios_pool_piscine_required":   state(240),

  "switch.helios_chauffe_eau_manual":         state("off", {
    helios_device_on: false, last_effective_score: 0.0, last_decision_reason: "score_too_low",
    device_name: "Chauffe-eau", device_type: "water_heater", device_priority: 6,
    wh_temp_entity: "sensor.temperature_chauffe_eau", wh_temp_target: 61,
  }),
  "sensor.temperature_chauffe_eau":           state(48.0),

  "switch.helios_voiture_manual":             state("off", {
    helios_device_on: false, last_effective_score: 0.05, last_decision_reason: "no_budget",
    device_name: "Voiture", device_type: "ev_charger", device_priority: 8,
    ev_soc_entity: "sensor.ev_soc", ev_plugged_entity: "binary_sensor.ev_branche",
  }),
  "sensor.ev_soc":                            state(31),
  "binary_sensor.ev_branche":                 state("on"),
});

const configCompact = {
  compact: true,
  entry_id: MOCK_ENTRY_ID,
  info_url: "https://example.com",
};

// ---------------------------------------------------------------------------
// Scenario 4 — dark mode, sunny day, battery mid, Tempo bleu
// ---------------------------------------------------------------------------
const configDark = {
  entry_id: MOCK_ENTRY_ID,
  info_url: "https://example.com",
  devices: [
    {
      name: "Chauffe-eau", type: "water_heater",
      entity:      "switch.helios_chauffe_eau_manual",
      temp_entity: "sensor.temperature_chauffe_eau",
      temp_target: 61,
    },
    {
      name: "Voiture", type: "ev_charger",
      entity:         "switch.helios_voiture_manual",
      soc_entity:     "sensor.ev_soc",
      plugged_entity: "binary_sensor.ev_branche",
    },
  ],
};

// Wait for custom elements to be defined
await customElements.whenDefined("helios-card");

const cardFull    = document.getElementById("card-full");
const cardNight   = document.getElementById("card-night");
const cardCompact = document.getElementById("card-compact");
const cardDark    = document.getElementById("card-dark");

cardFull.setConfig(configFull);
cardFull.hass = hassDay;

cardNight.setConfig(configNight);
cardNight.hass = hassNight;

cardCompact.setConfig(configCompact);
cardCompact.hass = hassCompact;

cardDark.setConfig(configDark);
cardDark.hass = hassDay;
</script>
</body>
</html>
