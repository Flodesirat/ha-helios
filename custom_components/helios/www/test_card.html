<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helios Card — Test</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #f0f0f0;
      font-family: Roboto, sans-serif;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: flex-start;
    }
    .col {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 360px;
    }
    h3 {
      margin: 0 0 4px;
      font-size: 12px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .dark-col {
      color-scheme: dark;
      background: #1c1c1e;
      padding: 12px;
      border-radius: 12px;
    }
    .dark-col h3 { color: #999; }
    .dark-col helios-card {
      --card-background-color: #2c2c2e;
      --ha-card-border-radius: 12px;
      --primary-text-color: #e5e5e7;
      --secondary-text-color: #aeaeb2;
      --secondary-background-color: #3a3a3c;
      --divider-color: #48484a;
    }
  </style>
</head>
<body>

<div class="col">
  <h3>Flux + appareils</h3>
  <helios-card id="card-full"></helios-card>
</div>

<div class="col">
  <h3>Sans batterie — nuit</h3>
  <helios-card id="card-night"></helios-card>
</div>

<div class="col">
  <h3>Compact — jour Tempo rouge</h3>
  <helios-card id="card-compact"></helios-card>
</div>

<div class="col dark-col">
  <h3>Mode sombre — jour Tempo bleu</h3>
  <helios-card id="card-dark"></helios-card>
</div>

<script src="./helios-card.js" type="module"></script>
<script type="module">
// ---------------------------------------------------------------------------
// Mock hass helper
// ---------------------------------------------------------------------------
const MOCK_ENTRY_ID = "helios_test_entry_abc123";

// Entity registry: maps entity_id → { config_entry_id, unique_id }
// Mirrors what HA exposes in hass.entities for auto-discovery.
function mockEntity(suffix) {
  return { config_entry_id: MOCK_ENTRY_ID, unique_id: `${MOCK_ENTRY_ID}_${suffix}` };
}

const MOCK_ENTITIES = {
  // System sensors
  "sensor.helios_pv_power":      mockEntity("pv_power"),
  "sensor.helios_grid_power":    mockEntity("grid_power"),
  "sensor.helios_house_power":   mockEntity("house_power"),
  "sensor.helios_global_score":  mockEntity("global_score"),
  "sensor.helios_battery":       mockEntity("battery"),
  // Device state sensors — suggested_object_id: helios_{slug}, unique_id: device_state_{slug}
  "sensor.helios_pool":            mockEntity("device_state_pool"),
  "sensor.helios_water_heater":    mockEntity("device_state_water_heater"),
  "sensor.helios_dishwasher":      mockEntity("device_state_dishwasher"),
  "sensor.helios_washing_machine": mockEntity("device_state_washing_machine"),
  "sensor.helios_ev":              mockEntity("device_state_ev"),
  // Manual switches (control only)
  "switch.helios_pool_manual":           mockEntity("device_pool_manual"),
  "switch.helios_water_heater_manual":   mockEntity("device_water_heater_manual"),
  "switch.helios_dishwasher_manual":     mockEntity("device_dishwasher_manual"),
  "switch.helios_washing_machine_manual":mockEntity("device_washing_machine_manual"),
  "switch.helios_ev_manual":             mockEntity("device_ev_manual"),
};

function makeHass(states) {
  return {
    states,
    entities: MOCK_ENTITIES,
    callService(domain, service, data) {
      console.log(`callService: ${domain}.${service}`, data);
    },
  };
}

function state(value, attributes = {}) {
  return { state: String(value), attributes };
}

// ---------------------------------------------------------------------------
// Scenario 1 — sunny day, pool running, WH heating, appliance waiting
// ---------------------------------------------------------------------------
const hassDay = makeHass({
  "sensor.helios_pv_power":                   state(2800),
  "sensor.helios_grid_power":                 state(-300),   // export
  "sensor.helios_house_power":                state(1200),
  "sensor.helios_global_score":               state(0.74, { tempo_color: "blue", mode: "auto", peak_pv_w: 3500, grid_subscription_w: 6000 }),
  "sensor.helios_battery":                    state("charge", { battery_enabled: true, soc: 58, soc_level: "Optimale", power_w: -650, available_w: 1200 }),
  "switch.helios_auto_mode":                  state("on"),

  // Device sensors (all data here)
  "sensor.helios_pool": state("running", {
    device_name: "Pool", device_type: "pool", device_priority: 7,
    is_on: true, manual_mode: false, power_w: 750,
    last_effective_score: 0.82, last_decision_reason: "dispatch",
    filtration_done_min: 150, filtration_required_min: 240, force_remaining_min: 0,
  }),
  "sensor.helios_water_heater": state("running", {
    device_name: "Water Heater", device_type: "water_heater", device_priority: 6,
    is_on: true, manual_mode: false, power_w: 2000,
    last_effective_score: 0.45, last_decision_reason: "dispatch",
    temperature: 54.2, wh_temp_target: 61,
  }),
  "sensor.helios_dishwasher": state("waiting", {
    device_name: "Dishwasher", device_type: "appliance", device_priority: 4,
    is_on: false, manual_mode: false, power_w: 0,
    last_effective_score: 0.31, last_decision_reason: "score_too_low",
  }),
  "sensor.helios_washing_machine": state("running", {
    device_name: "Washing Machine", device_type: "appliance", device_priority: 3,
    is_on: true, manual_mode: false, power_w: 2100,
    last_effective_score: 0.29, last_decision_reason: "dispatch",
  }),
  "sensor.helios_ev": state("running", {
    device_name: "EV", device_type: "ev_charger", device_priority: 8,
    is_on: true, manual_mode: false, power_w: 1380,
    last_effective_score: 0.68, last_decision_reason: "dispatch",
    soc: 72, plugged: true,
  }),
  // Manual switches (state only, no metadata)
  "switch.helios_pool_manual":            state("off"),
  "switch.helios_water_heater_manual":    state("off"),
  "switch.helios_dishwasher_manual":      state("off"),
  "switch.helios_washing_machine_manual": state("off"),
  "switch.helios_ev_manual":              state("off"),
});

// ---------------------------------------------------------------------------
// Scenario 2 — night, no PV, battery discharging
// ---------------------------------------------------------------------------
const hassNight = makeHass({
  "sensor.helios_pv_power":                   state(0),
  "sensor.helios_grid_power":                 state(450),    // import
  "sensor.helios_house_power":                state(900),
  "sensor.helios_global_score":               state(0.22, { tempo_color: "red", mode: "auto", peak_pv_w: 3500, grid_subscription_w: 6000 }),
  // no battery configured → sensor absent, battery node hidden
  "switch.helios_auto_mode":                  state("on"),

  "sensor.helios_pool": state("off", {
    device_name: "Pool", device_type: "pool", device_priority: 7,
    is_on: false, manual_mode: false, power_w: 0,
    last_effective_score: 0.0, last_decision_reason: "outside_window",
    filtration_done_min: 240, filtration_required_min: 240, force_remaining_min: 0,
  }),
  "sensor.helios_water_heater": state("off", {
    device_name: "Water Heater", device_type: "water_heater", device_priority: 6,
    is_on: false, manual_mode: false, power_w: 0,
    last_effective_score: 0.0, last_decision_reason: "satisfied",
    temperature: 62.1, wh_temp_target: 61,
  }),
  "sensor.helios_dishwasher": state("running", {
    device_name: "Dishwasher", device_type: "appliance", device_priority: 4,
    is_on: true, manual_mode: false, power_w: 1950,
    last_effective_score: 0.55, last_decision_reason: "dispatch",
  }),
  "sensor.helios_washing_machine": state("waiting", {
    device_name: "Washing Machine", device_type: "appliance", device_priority: 3,
    is_on: false, manual_mode: false, power_w: 0,
    last_effective_score: 0.2, last_decision_reason: "no_budget",
  }),
  "switch.helios_pool_manual":            state("off"),
  "switch.helios_water_heater_manual":    state("off"),
  "switch.helios_dishwasher_manual":      state("off"),
  "switch.helios_washing_machine_manual": state("off"),
});

// ---------------------------------------------------------------------------
// Inject config + hass into each card
// ---------------------------------------------------------------------------
const configFull = {
  entry_id: MOCK_ENTRY_ID,   // mode auto-découverte
  info_url: "https://example.com",
};

const configNight = {
  entry_id: MOCK_ENTRY_ID,
};

// ---------------------------------------------------------------------------
// Scenario 3 — compact, Tempo rouge, batterie faible, voiture branchée
// ---------------------------------------------------------------------------
const hassCompact = makeHass({
  "sensor.helios_pv_power":                   state(1500),
  "sensor.helios_grid_power":                 state(800),    // import
  "sensor.helios_house_power":                state(2200),
  "sensor.helios_global_score":               state(0.15, { tempo_color: "red", mode: "auto", peak_pv_w: 3500, grid_subscription_w: 6000 }),
  "sensor.helios_battery":                    state("reserve", { battery_enabled: true, soc: 18, soc_level: "Réserve", power_w: 0, available_w: 0 }),
  "switch.helios_auto_mode":                  state("on"),

  "sensor.helios_pool": state("off", {
    device_name: "Pool", device_type: "pool", device_priority: 7,
    is_on: false, manual_mode: false, power_w: 0,
    last_effective_score: 0.0, last_decision_reason: "outside_window",
    filtration_done_min: 60, filtration_required_min: 240, force_remaining_min: 0,
  }),
  "sensor.helios_water_heater": state("off", {
    device_name: "Water Heater", device_type: "water_heater", device_priority: 6,
    is_on: false, manual_mode: false, power_w: 0,
    last_effective_score: 0.0, last_decision_reason: "score_too_low",
    temperature: 48.0, wh_temp_target: 61,
  }),
  "sensor.helios_ev": state("off", {
    device_name: "EV", device_type: "ev_charger", device_priority: 8,
    is_on: false, manual_mode: false, power_w: 0,
    last_effective_score: 0.05, last_decision_reason: "no_budget",
    soc: 31, plugged: true,
  }),
  "switch.helios_pool_manual":          state("off"),
  "switch.helios_water_heater_manual":  state("off"),
  "switch.helios_ev_manual":            state("off"),
});

const configCompact = {
  compact: true,
  entry_id: MOCK_ENTRY_ID,
  info_url: "https://example.com",
};

// ---------------------------------------------------------------------------
// Scenario 4 — dark mode, sunny day, battery mid, Tempo bleu
// ---------------------------------------------------------------------------
const configDark = {
  entry_id: MOCK_ENTRY_ID,
  info_url: "https://example.com",
};

// Wait for custom elements to be defined
await customElements.whenDefined("helios-card");

const cardFull    = document.getElementById("card-full");
const cardNight   = document.getElementById("card-night");
const cardCompact = document.getElementById("card-compact");
const cardDark    = document.getElementById("card-dark");

cardFull.setConfig(configFull);
cardFull.hass = hassDay;

cardNight.setConfig(configNight);
cardNight.hass = hassNight;

cardCompact.setConfig(configCompact);
cardCompact.hass = hassCompact;

cardDark.setConfig(configDark);
cardDark.hass = hassDay;
</script>
</body>
</html>
