name: Auto Beta Release

on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches: [main]

jobs:
  beta-release:
    # Only run when tests passed (not on failure or cancellation)
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Compute next beta version
        id: version
        run: |
          current=$(jq -r '.version' custom_components/helios/manifest.json)
          # If version already has bN suffix, increment N.
          # Otherwise it's a stable release: increment the patch number and start at b1.
          if [[ "$current" =~ ^([0-9]+\.[0-9]+\.[0-9]+)b([0-9]+)$ ]]; then
            base="${BASH_REMATCH[1]}"
            beta="${BASH_REMATCH[2]}"
            next="${base}b$((beta + 1))"
          elif [[ "$current" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
            next="${major}.${minor}.$((patch + 1))b1"
          else
            echo "Unrecognised version format: $current" >&2
            exit 1
          fi
          # Skip if tag already exists (workflow ran twice on same state)
          if git ls-remote --tags origin | grep -q "refs/tags/v${next}$"; then
            echo "Tag v${next} already exists — skipping release."
            echo "version=" >> "$GITHUB_OUTPUT"
          else
            echo "version=$next" >> "$GITHUB_OUTPUT"
          fi

      - name: Update manifest version
        if: steps.version.outputs.version != ''
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' \
            custom_components/helios/manifest.json > _tmp.json
          mv _tmp.json custom_components/helios/manifest.json

      - name: Commit and tag
        if: steps.version.outputs.version != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/helios/manifest.json
          git commit -m "Release ${{ steps.version.outputs.version }} [skip ci]"
          git tag "v${{ steps.version.outputs.version }}"
          git push
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        if: steps.version.outputs.version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          generate_release_notes: true
          prerelease: true
